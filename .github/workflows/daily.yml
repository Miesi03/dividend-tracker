name: Dividend Tracker – Daily Check

on:
  schedule:
    # Taeglich Mo–Fr um 08:00 Uhr MEZ (= 07:00 UTC, Sommerzeit)
    # Fuer Winterzeit (CET = UTC+1) auf "0 6 * * 1-5" aendern
    - cron: "0 7 * * 1-5"

  # Manueller Start zum Testen: Actions-Tab → "Run workflow"
  workflow_dispatch:

jobs:
  check-dividends:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # benoetigt um die SQLite-DB zu committen

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pakete installieren
        run: pip install -r requirements.txt

      - name: Dividend-Datenbank wiederherstellen
        # Die SQLite-DB wird im Repo gespeichert damit der Verlauf erhalten bleibt.
        # Beim ersten Lauf existiert sie noch nicht – das ist in Ordnung.
        run: |
          echo "Datenbank-Status:"
          ls -lh dividend_history.db 2>/dev/null || echo "  (noch nicht vorhanden – wird erstellt)"

      - name: Tracker ausfuehren
        run: python tracker.py
        env:
          FMP_KEY:           ${{ secrets.FMP_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Datenbankstand speichern
        # Committet die aktualisierte SQLite-DB zurueck ins Repo
        # damit der naechste Lauf den Verlauf kennt.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dividend_history.db
          git diff --staged --quiet || git commit -m "chore: Dividendendaten aktualisiert $(date -u +%Y-%m-%d)"
          git push
