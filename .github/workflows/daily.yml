name: Dividend Tracker

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Code laden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Vollständige History – verhindert Rebase-Fehler bei shallow clone

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pakete installieren
        run: pip install -r requirements.txt   # kein direktes pip install – nutzt requirements.txt incl. curl_cffi

      - name: Tracker ausfuehren
        run: python tracker.py
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Datenbank speichern
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # WICHTIG: erst committen, DANN rebasen. tracker.py ändert die DB →
          # ein "git pull --rebase" vor dem Commit scheitert an ungestageten
          # Änderungen ("cannot pull with rebase: You have unstaged changes").
          git add -f dividend_history.db
          git diff --staged --quiet && echo "Keine Aenderungen — nichts zu committen" || git commit -m "db: update $(date -u +%Y-%m-%d)"
          # Jetzt ist der Working Tree sauber → Rebase auf Remote-Stand funktioniert.
          git pull --rebase origin main
          git push
