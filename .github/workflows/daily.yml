name: Dividend Tracker – Daily Check

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  check-dividends:
    runs-on: ubuntu-latest

    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pakete installieren
        run: pip install yfinance pyyaml

      - name: Datenbank vom letzten Lauf wiederherstellen
        uses: actions/cache@v4
        with:
          path: dividend_history.db
          key: dividend-db-${{ runner.os }}
          restore-keys: dividend-db-

      - name: Tracker ausfuehren
        run: python tracker.py
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Datenbank fuer naechsten Lauf speichern
        uses: actions/cache/save@v4
        if: always()
        with:
          path: dividend_history.db
          key: dividend-db-${{ runner.os }}-${{ github.run_id }}
